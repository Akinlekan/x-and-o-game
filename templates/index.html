<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - X & O Game</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">X & O Game</h1>
        <p class="subtitle">Tic Tac Toe</p>

        <div class="mode-selector">
            <button class="mode-btn active" id="pvp-btn" onclick="setMode('pvp')">👥 Player vs Player</button>
            <button class="mode-btn" id="pvc-btn" onclick="setMode('pvc')">🤖 Player vs Computer</button>
        </div>

        <div class="scoreboard">
            <div class="score-item x-score">
                <span class="score-label">Player X</span>
                <span class="score-value" id="score-x">{{ scores.X }}</span>
            </div>
            <div class="score-item draw-score">
                <span class="score-label">Draws</span>
                <span class="score-value" id="score-draw">{{ scores.Draw }}</span>
            </div>
            <div class="score-item o-score">
                <span class="score-label">Player O</span>
                <span class="score-value" id="score-o">{{ scores.O }}</span>
            </div>
        </div>

        <div class="status-bar">
            <div class="status" id="status">Player <span class="player-x">X</span>'s Turn</div>
        </div>

        <div class="board" id="board">
            <div class="cell" data-index="0" onclick="makeMove(0)"></div>
            <div class="cell" data-index="1" onclick="makeMove(1)"></div>
            <div class="cell" data-index="2" onclick="makeMove(2)"></div>
            <div class="cell" data-index="3" onclick="makeMove(3)"></div>
            <div class="cell" data-index="4" onclick="makeMove(4)"></div>
            <div class="cell" data-index="5" onclick="makeMove(5)"></div>
            <div class="cell" data-index="6" onclick="makeMove(6)"></div>
            <div class="cell" data-index="7" onclick="makeMove(7)"></div>
            <div class="cell" data-index="8" onclick="makeMove(8)"></div>
        </div>

        <div class="buttons">
            <button class="btn btn-primary" onclick="resetGame()">🔄 New Game</button>
            <button class="btn btn-secondary" onclick="resetScores()">🗑️ Reset Scores</button>
        </div>

        <div class="winner-overlay" id="winner-overlay">
            <div class="winner-box">
                <div class="winner-emoji" id="winner-emoji">🎉</div>
                <div class="winner-text" id="winner-text">Player X Wins!</div>
                <button class="btn btn-primary" onclick="resetGame()">Play Again</button>
            </div>
        </div>
    </div>

    <script src="/static/js/game.js"></script>
</body>
</html>
